name: Trigger auto deployment for oe-mcp-auth-staging

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ release ]
    paths:
    - '**'
    - '.github/workflows/oe-mcp-auth-staging-AutoDeployTrigger-fe4bf1d1-43d8-440b-a11f-e33a6a9f2988.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.OEMCPAUTHSTAGING_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.OEMCPAUTHSTAGING_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.OEMCPAUTHSTAGING_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: orderease.azurecr.io
          registryUsername: ${{ secrets.OEMCPAUTHSTAGING_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.OEMCPAUTHSTAGING_REGISTRY_PASSWORD }}
          containerAppName: oe-mcp-auth-staging
          resourceGroup: dashboards
          imageToBuild: orderease.azurecr.io/oe-mcp-auth-staging:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


