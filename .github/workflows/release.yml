name: Deploy to Azure Container Apps

on:
  workflow_dispatch:
  push:
    branches: [main, release]

env:
  AZURE_CONTAINER_REGISTRY: orderease
  ACR_REPOSITORY_NAME: oe-mcp-auth
  RESOURCE_GROUP: dashboards
  APP_ENVIRONMENT: oe-sales-dashboards

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'staging' || 'production' }}

    env:
      CONTAINER_APP_NAME: ${{ github.ref_name == 'main' && 'oe-mcp-auth-staging' || 'oe-mcp-auth-production' }}
      IMAGE_TAG: ${{ github.ref_name == 'main' && 'staging' || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push container image to ACR
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.ACR_REPOSITORY_NAME }}:${{ env.IMAGE_TAG }}
          file: Dockerfile
          provenance: false

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set container secrets
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp secret set \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --secrets \
                "connectionstrings-activeconnection=${{ secrets.CONNECTIONSTRINGS__ACTIVECONNECTION }}" \
                "connectionstrings-redisconnection=${{ secrets.CONNECTIONSTRINGS__REDISCONNECTION }}" \
                "dabjwt-rsaprivatekeypembase64=${{ secrets.DABJWT__RSAPRIVATEKEYPEMBASE64 }}"

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.ACR_REPOSITORY_NAME }}:${{ env.IMAGE_TAG }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          containerAppEnvironment: ${{ env.APP_ENVIRONMENT }}
          environmentVariables: >-
            ConnectionStrings__ActiveConnection=secretref:connectionstrings-activeconnection
            ConnectionStrings__RedisConnection=secretref:connectionstrings-redisconnection
            McpProxy__DestinationUrl=${{ secrets.MCPPROXY__DESTINATIONURL }}
            DabJwt__Issuer=${{ secrets.DABJWT__ISSUER }}
            DabJwt__RsaPrivateKeyPemBase64=secretref:dabjwt-rsaprivatekeypembase64
