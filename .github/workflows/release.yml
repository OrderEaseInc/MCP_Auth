name: Deploy to Azure Container Apps

on:
  workflow_dispatch:
  push:
    branches: [release]

env:
  AZURE_CONTAINER_REGISTRY: orderease
  CONTAINER_APP_NAME: oe-mcp-auth
  RESOURCE_GROUP: dashboards
  APP_ENVIRONMENT: oe-sales-dashboards

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push container image to ACR
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.CONTAINER_APP_NAME }}:latest
          file: Dockerfile
          provenance: false
#          build-args: |
#            arg=${{ secrets.SECRET_NAME }}

